amcl:
  ros__parameters:
    use_sim_time: false

    # Tuning parameters
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Frames
    global_frame_id: "map"
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    tf_broadcast: true

    # Topics
    scan_topic: "/dummy/lidar"

    # Sensor model
    laser_model_type: likelihood_field
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    laser_likelihood_max_dist: 2.0

    # Scan handling
    update_min_d: 0.2
    update_min_a: 0.2
    resample_interval: 1
    laser_min_range: 0.1
    laser_max_range: 10.0

    # Map
    map_file: "/home/autodrive_devkit/map/cdc_compete/the_map.pgm"

    # Initial pose
    set_initial_pose: false